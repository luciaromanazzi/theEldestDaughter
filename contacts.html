      <div>
        <h1 id="claim" class="luxurious" style="padding-bottom: 0%;">Letters to an eldest daughter</h1>
        <p style="font-size: 1.5rem;padding-bottom: 5%;">Feel free to use this safe place, your (anonymous) story may help!</p>
      </div>
      <div class="form-container"> 
        <form action="#" method="post" class="letters">
          <div class="input-group">
              <input type="text" id="nome" name="nome" placeholder="How should I call you?">
              <label for="nome">Name (optional)</label>
          </div>
          <div class="input-group">
              <input type="email" id="email" name="email" required placeholder="youremail@example.com">
              <label for="email">Email*</label>
          </div>
          <div class="input-group">
              <textarea id="messaggio" name="messaggio"  required placeholder="Being an eldest daughter in my experience..."></textarea>
              <label for="messaggio">Your letter </label>
          </div>
          <button type="submit" >Send</button>
      </form>

      </div>
                    
    </section>
